<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einsatzprotokoll | Eigenunfall</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { --primary-color: #003366; --bg-light: #f4f7f6; }
        body { background-color: var(--bg-light); padding: 20px; font-family: 'Segoe UI', sans-serif; }
        .report-card { max-width: 900px; margin: auto; background: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid #e0e0e0; }
        .header-logo { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 3px solid var(--primary-color); }
        .section-title { font-size: 1.1rem; font-weight: 700; color: var(--primary-color); margin-top: 25px; margin-bottom: 15px; display: flex; align-items: center; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: #e0e0e0; margin-left: 15px; }
        .auto-scale-wrapper { width: 100%; border: 1px solid #ced4da; border-radius: 8px; background: #fff; padding: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .auto-scale-textarea { width: 100%; border: none; outline: none; resize: none; overflow: hidden; display: block; font-size: 16px; line-height: 1.4; min-height: 100px; }
        .large-area { min-height: 200px; }
        #imagePreviewContainer { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .preview-img { width: 100%; height: auto; border-radius: 8px; border: 1px solid #ddd; }
        .upload-area { border: 2px dashed #003366; padding: 20px; text-align: center; border-radius: 8px; background: #f0f4f8; cursor: pointer; }
    </style>
</head>
<body>

<div id="captureArea">
    <div class="report-card">
        <div class="header-logo">
            <h2>Einsatzprotokoll: Eigenunfall</h2>
            <small class="text-uppercase fw-bold text-secondary">Landespolizeidirektion Dresden</small>
        </div>

        <form id="accidentForm">
            <div class="section-title">Allgemeine Informationen</div>
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label fw-bold">Datum / Uhrzeit</label><input type="datetime-local" id="timestamp" class="form-control"></div>
                <div class="col-md-6"><label class="form-label fw-bold">Einsatzort</label><input type="text" id="ort" class="form-control"></div>
            </div>

            <div class="section-title">Beteiligte & Fahrzeug</div>
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label fw-bold">Beteiligter Beamter</label><input type="text" id="beamter" class="form-control"></div>
                <div class="col-md-6"><label class="form-label fw-bold">Dienstnummer</label><input type="text" class="form-control"></div>
            </div>

            <div class="section-title">Schaden & Hergang</div>
            <div class="col-12"><label class="form-label fw-bold">Unfallhergang</label>
                <div class="auto-scale-wrapper"><textarea class="auto-scale-textarea large-area" id="hergang"></textarea></div>
            </div>

            <div class="section-title">Dokumentation</div>
            <div class="upload-area" onclick="document.getElementById('imageInput').click()">
                <p class="mb-0 small">Bilder hinzufügen</p>
                <input type="file" id="imageInput" class="d-none" accept="image/*" multiple onchange="previewImages()">
            </div>
            <div id="imagePreviewContainer"></div>

            <div class="col-12 text-center mt-5">
                <button type="button" id="sendBtn" class="btn btn-primary btn-lg shadow" onclick="captureAndSend()">
                    BERICHT SENDEN
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // Funktion zum Schließen des Tablets (Signal an FiveM)
    function closeTablet() {
        fetch(`https://${GetParentResourceName()}/exit`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify({})
        });
    }

    window.onload = function() {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('timestamp').value = now.toISOString().slice(0, 16);
    };
